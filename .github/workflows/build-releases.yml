name: Build container release images
on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  # FEDIWAY: derive MASTODON_VERSION_METADATA from the release tag
  compute-version-metadata:
    runs-on: ubuntu-latest
    outputs:
      fediway_metadata: ${{ steps.compute.outputs.metadata }}
    steps:
      - id: compute
        run: |
          ref="${GITHUB_REF_NAME}"
          echo "metadata=fediway.${ref#v}" >> "$GITHUB_OUTPUT"

  build-image:
    needs: compute-version-metadata
    uses: ./.github/workflows/build-container-image.yml
    with:
      file_to_build: Dockerfile
      # FEDIWAY: only push to our own registry
      push_to_images: |
        ghcr.io/fediway/mastodon
      # Do not use cache when building releases, so apt update is always ran and the release always contain the latest packages
      cache: false
      version_metadata: ${{ needs.compute-version-metadata.outputs.fediway_metadata }}
      flavor: |
        latest=auto
      tags: |
        type=pep440,pattern={{raw}}
        type=pep440,pattern=v{{major}}.{{minor}}
    secrets: inherit

  # FEDIWAY: removed build-image-streaming; we use upstream's published image
