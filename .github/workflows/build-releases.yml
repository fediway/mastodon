name: Build container release images
on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  # FEDIWAY: removed `check-latest-stable` job. Upstream used stable-X.Y branches to
  # decide whether a tag should receive the `:latest` floating tag. Fediway uses a
  # single `release` branch + semver tags, so we let docker/metadata-action's
  # `latest=auto` handle it: any non-prerelease semver tag becomes :latest. Revisit
  # when we ever need stricter latest-tagging (e.g. hotfix backports for old versions).

  build-image:
    uses: ./.github/workflows/build-container-image.yml
    with:
      file_to_build: Dockerfile
      # FEDIWAY: push only to our own ghcr.io namespace. Removed `tootsuite/mastodon`
      # (Docker Hub) — we don't publish there.
      push_to_images: |
        ghcr.io/fediway/mastodon
      # Do not use cache when building releases, so apt update is always ran and the release always contain the latest packages
      cache: false
      flavor: |
        latest=auto
      tags: |
        type=pep440,pattern={{raw}}
        type=pep440,pattern=v{{major}}.{{minor}}
    secrets: inherit

  # FEDIWAY: removed `build-image-streaming` job. We use upstream's published
  # streaming image (`ghcr.io/mastodon/mastodon-streaming:<upstream-version>`) and
  # never build our own. The streaming image version must match the upstream base
  # of our Fediway release — see FEDIWAY.md.
